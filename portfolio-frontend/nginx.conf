server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # ── Access logging (to stdout so Docker / Railway captures it) ───────────────
  access_log /dev/stdout;
  error_log  /dev/stderr warn;

  # ── Gzip compression ─────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    font/woff
    font/woff2;

  # ── Security headers (applied globally) ──────────────────────────────────────
  # HSTS: force HTTPS for 1 year, include subdomains and preload list
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # Prevent clickjacking — deny embedding in any iframe
  add_header X-Frame-Options "DENY" always;

  # Prevent MIME-type sniffing
  add_header X-Content-Type-Options "nosniff" always;

  # Disable legacy XSS filter (modern browsers; CSP is the real protection)
  add_header X-XSS-Protection "0" always;

  # Limit referrer information
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Reduce browser feature surface (disable unused powerful APIs)
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

  # Content Security Policy — lock down script/style origins
  # Adjust hashes/nonces if you add inline scripts via Angular build
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

  # ── Static assets — aggressive long-term cache ────────────────────────────────
  # Angular hashed filenames (main.abc123.js, styles.abc123.css …)
  location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|webp|gif|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Vary Accept-Encoding;
    # Repeat security headers — nginx add_header inheritance requires this in nested blocks
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri =404;
  }

  # i18n JSON files change on deploy — shorter cache
  location ~* ^/i18n/ {
    expires 10m;
    add_header Cache-Control "public, must-revalidate";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # ── Angular SPA — always serve index.html for unknown routes ─────────────────
  location / {
    # index.html must never be cached so the browser picks up new hashed assets
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; object-src 'none'; frame-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
    try_files $uri $uri/ /index.html;
  }
}
