server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # ── Gzip compression ─────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    font/woff
    font/woff2;

  # ── Static assets — aggressive long-term cache ────────────────────────────────
  # Angular hashed filenames (main.abc123.js, styles.abc123.css …)
  location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|webp|gif|svg)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Vary Accept-Encoding;
    try_files $uri =404;
  }

  # i18n JSON files change on deploy — shorter cache
  location ~* ^/i18n/ {
    expires 10m;
    add_header Cache-Control "public, must-revalidate";
    try_files $uri =404;
  }

  # ── Angular SPA — always serve index.html for unknown routes ─────────────────
  location / {
    # index.html must never be cached so the browser picks up new hashed assets
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
