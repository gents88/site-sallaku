<div class="session-timeout-backdrop" aria-hidden="true"></div>

<section
  class="session-timeout"
  role="dialog"
  aria-modal="true"
  aria-labelledby="session-timeout-title"
  aria-describedby="session-timeout-description">
  <div class="session-timeout__pulse" aria-hidden="true"></div>

  <div class="session-timeout__eyebrow">Security Timeout</div>
  <h2 id="session-timeout-title">{{ 'session.warning_title' | translate }}</h2>

  <p id="session-timeout-description" class="session-timeout__message">
    {{ 'session.warning_body' | translate }}
  </p>

  <div class="session-timeout__countdown" aria-live="assertive" aria-atomic="true">
    <span class="session-timeout__seconds">{{ countdownSeconds }}</span>
    <span class="session-timeout__label">{{ 'session.seconds_remaining' | translate }}</span>
  </div>

  <div class="session-timeout__actions">
    <button type="button" class="session-timeout__button session-timeout__button--primary" (click)="stayLoggedIn.emit()">
      {{ 'session.stay_logged_in' | translate }}
    </button>
    <button type="button" class="session-timeout__button session-timeout__button--warn" (click)="logoutNow.emit()">
      {{ 'session.logout_now' | translate }}
    </button>
  </div>
</section>
