# ─────────────────────────────────────────────────────────
#  SVILUPPO LOCALE
#  Avvia tutto con:
#    docker compose -f docker-compose.local.yml up -d
#  Ferma e rimuovi i volumi:
#    docker compose -f docker-compose.local.yml down -v
#
#  Servizi disponibili dopo l'avvio:
#   Backend      → http://localhost:3000
#   Swagger docs → http://localhost:3000/api/docs
#   Mongo-Express→ http://localhost:8081  (admin / admin123)
#   Redis        → localhost:6379
#   MongoDB      → localhost:27017
# ─────────────────────────────────────────────────────────

version: '3.9'

services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_local:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - portfolio_net

  mongo-express:
    image: mongo-express:1.0
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_OPTIONS_EDITORTHEME: ambiance
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - portfolio_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data_local:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - portfolio_net

  backend:
    build:
      context: ./portfolio-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./portfolio-backend/.env
    environment:
      PORT: 3000
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/portfolio
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - portfolio_net

volumes:
  mongo_data_local:
  redis_data_local:

networks:
  portfolio_net:
    driver: bridge
