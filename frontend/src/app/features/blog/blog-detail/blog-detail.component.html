@if (loading) {
  <div class="container section"><app-loading-spinner /></div>
} @else if (notFound) {
  <div class="container section not-found">
    <mat-icon>article</mat-icon>
    <h1>Post not found</h1>
    <a routerLink="/blog" class="btn btn-primary">← Back to Blog</a>
  </div>
} @else if (post) {
  <article class="container section post-article">
    <a routerLink="/blog" class="back-link" appTrackClick eventType="blog" label="blog_back_link"><mat-icon>arrow_back</mat-icon> All posts</a>

    @if (post.coverImage) {
      <img [src]="post.coverImage" [alt]="post.title" class="post-article__cover" loading="eager" width="1200" height="630" />
    }

    <header class="post-article__header">
      <div class="post-article__tags">
        @for (tag of post.tags; track tag) {
          <span class="badge">#{{ tag }}</span>
        }
      </div>
      <h1>{{ localizedTitle }}</h1>
      <p class="text-muted">
        <time [dateTime]="post.publishedAt ?? ''">{{ post.publishedAt | date:'longDate' }}</time>
      </p>
    </header>

    <div class="post-article__content prose" [innerHTML]="localizedContent"></div>

    <!-- AdSense unit — shown below article content. Replace publisher/slot IDs. -->
    <app-ad-unit adClient="ca-pub-XXXXXXXXXXXXXXXX" adSlot="XXXXXXXXXX" />
  </article>
}
