    <path d="M 140,124 L 178,124 L 186,150 L 162,150 Z"/>

    <!-- ══ RIGHT NECK ══ -->
    <path d="M 360,124 L 322,124 L 314,150 L 338,150 Z"/>

    <!-- ══ BODY ══ -->
