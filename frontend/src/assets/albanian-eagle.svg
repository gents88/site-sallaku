    <path d="M 346,151 L 384,13  L 365,10  L 338,150 Z"/>
    <path d="M 354,149 L 417,14  L 398,10  L 346,148 Z"/>
    <path d="M 362,147 L 448,24  L 432,17  L 354,148 Z"/>
    <path d="M 370,145 L 472,42  L 458,34  L 362,146 Z"/>
    <path d="M 379,144 L 490,68  L 479,58  L 371,145 Z"/>
    <path d="M 387,144 L 496,97  L 490,84  L 380,145 Z"/>

    <!-- ══ RIGHT SECONDARY FEATHERS (lower wing) ══ -->
    <path d="M 336,166 L 376,210 L 364,216 L 331,170 Z"/>
    <path d="M 344,174 L 390,222 L 378,228 L 339,178 Z"/>
    <path d="M 353,182 L 404,237 L 392,241 L 348,186 Z"/>
    <path d="M 362,190 L 417,250 L 404,254 L 357,194 Z"/>

