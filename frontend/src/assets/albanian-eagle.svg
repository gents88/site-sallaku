    <path d="M 208,420 L 180,442 L 188,456 L 213,428 Z"/>
    <path d="M 216,424 L 192,454 L 201,465 L 221,434 Z"/>
    <path d="M 226,425 L 218,460 L 228,467 L 233,434 Z"/>
    <path d="M 235,420 L 244,454 L 256,456 L 244,428 Z"/>

    <!-- ══ RIGHT LEG (mirror) ══ -->
