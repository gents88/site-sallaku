    <path d="M 146,149 L 83,14   L 102,10  L 154,148 Z"/>
    <path d="M 138,147 L 52,24   L 68,17   L 146,148 Z"/>
    <path d="M 130,145 L 28,42   L 42,34   L 138,146 Z"/>
    <path d="M 121,144 L 10,68   L 21,58   L 129,145 Z"/>
    <path d="M 113,144 L 4,97    L 10,84   L 120,145 Z"/>

    <!-- ══ LEFT SECONDARY FEATHERS (lower wing) ══ -->
    <path d="M 164,166 L 124,210 L 136,216 L 169,170 Z"/>
    <path d="M 156,174 L 110,222 L 122,228 L 161,178 Z"/>
    <path d="M 147,182 L 96,237  L 108,241 L 152,186 Z"/>
    <path d="M 138,190 L 83,250  L 96,254  L 143,194 Z"/>

