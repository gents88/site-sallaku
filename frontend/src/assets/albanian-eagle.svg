<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 490">
  <title>Aquila Shqiptare - Albanian Double-Headed Eagle</title>
  <g fill="#cd212a">

    <!-- ══ LEFT HEAD ══ -->
    <ellipse cx="158" cy="78" rx="52" ry="52"/>
    <!-- Upper beak -->
    <path d="M 108,62 L 55,46 L 60,72 L 108,78 Z"/>
    <!-- Lower beak hook -->
    <path d="M 108,78 L 60,74 Q 62,96 74,94 L 108,87 Z"/>

    <!-- ══ RIGHT HEAD ══ -->
    <ellipse cx="342" cy="78" rx="52" ry="52"/>
