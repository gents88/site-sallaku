# ─────────────────────────────────────────────────────────
#  DEPLOY SU PLESK — Setup semplice
#
#  Avvia backend NestJS + MongoDB sul server Plesk.
#  Il backend risponde su 127.0.0.1:3000 (non raggiungibile da fuori).
#  Plesk nginx fa da reverse proxy: /api/* → localhost:3000
#
#  SUL SERVER (una volta clonato il repo):
#    docker compose -f docker-compose.plesk.yml up -d --build
#
#  Per aggiornare dopo una modifica:
#    docker compose -f docker-compose.plesk.yml up -d --build backend
# ─────────────────────────────────────────────────────────

services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    # Porta NON esposta: accessibile solo nella rete Docker interna
    networks:
      - portfolio_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.plesk
    environment:
      PORT: "3000"
      NODE_ENV: production
      # Sovrascrive qualsiasi MONGODB_URI nell'env file con quello del container Docker
      MONGODB_URI: mongodb://mongo:27017/portfolio
    ports:
      # Solo localhost: Plesk nginx fa da proxy, non esposto a internet
      - "127.0.0.1:3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - portfolio_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "4000"
      NODE_ENV: production
      # SSR: chiama il backend sulla rete Docker interna
      API_URL: http://backend:3000/api/v1
    ports:
      # Solo localhost: Plesk nginx fa da proxy, non esposto a internet
      - "127.0.0.1:4000:4000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - portfolio_net

volumes:
  mongo_data:

networks:
  portfolio_net:
    driver: bridge
