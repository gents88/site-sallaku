name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portfolio-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true   # non-blocking until lint baseline is clean

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Test
        run: npm test -- --passWithNoTests --forceExit
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-at-least-32-chars-long
          MONGODB_URI: mongodb://localhost:27017/portfolio_test

  # ── Frontend ──────────────────────────────────────────
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portfolio-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build:prod

  # ── Docker build smoke test ───────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (cache check)
        uses: docker/build-push-action@v5
        with:
          context: ./portfolio-backend
          file: ./portfolio-backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: portfolio-backend:ci

      - name: Build frontend image (cache check)
        uses: docker/build-push-action@v5
        with:
          context: ./portfolio-frontend
          file: ./portfolio-frontend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: portfolio-frontend:ci
