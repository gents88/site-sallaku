# ─────────────────────────────────────────────────────────
#  AMBIENTE UAT (User Acceptance Testing)
#  Avvia tutto con:
#    docker compose -f docker-compose.uat.yml up -d --build
#  Ferma e rimuovi i volumi:
#    docker compose -f docker-compose.uat.yml down -v
#
#  Servizi disponibili dopo l'avvio:
#   Backend      → http://localhost:3001
#   Swagger docs → http://localhost:3001/api/docs
#   Mongo-Express→ http://localhost:8082  (admin / admin123)
#   Redis        → localhost:6380
#   MongoDB      → localhost:27018
# ─────────────────────────────────────────────────────────

version: '3.9'

services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data_uat:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - portfolio_uat_net

  mongo-express:
    image: mongo-express:1.0
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_OPTIONS_EDITORTHEME: ambiance
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - portfolio_uat_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data_uat:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - portfolio_uat_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.uat
    environment:
      PORT: 3000
      NODE_ENV: staging
      MONGODB_URI: mongodb://mongo:27017/portfolio_uat
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - portfolio_uat_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portfolio_uat_net

volumes:
  mongo_data_uat:
  redis_data_uat:

networks:
  portfolio_uat_net:
    driver: bridge
