<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contatto - Test invio email</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <style>
    body{font-family:Inter,Arial,Helvetica,sans-serif;padding:20px}
    form{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
    input,textarea{padding:8px;font-size:14px}
    button{padding:10px 14px}
    #status{min-height:24px}
  </style>
</head>
<body>
  <h1>Contatto - Test invio email</h1>
  <form id="contactForm">
    <input type="text" id="name" name="name" placeholder="Nome" required />
    <input type="email" id="email" name="email" placeholder="Email" required />
    <textarea id="message" name="message" placeholder="Messaggio" rows="6" required></textarea>
    <!-- Honeypot field: keep hidden from users, bots may fill it -->
    <input type="text" id="hp" name="hp" class="hp-field" autocomplete="off" aria-hidden="true" tabindex="-1" />
    <button type="submit">Invia</button>
    <div id="status" aria-live="polite"></div>
  </form>

  <script src="/js/contact.js"></script>
</body>
</html>
